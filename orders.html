<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلباتي - جوب البلاد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <style>
        .order-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-md); padding:1.25rem; margin-bottom:1rem; }
        .order-card h4 { margin-bottom:.25rem; }
        .order-items-list { margin:.5rem 0 .5rem 1.5rem; font-size:.9rem; }
        .badge-status { padding:.25em .75em; border-radius:var(--radius-full); font-size:.82rem; font-weight:700; }
        .badge-pending  { background:#fef3c7;color:#92400e; }
        .badge-confirmed{ background:#dbeafe;color:#1e40af; }
        .badge-ready    { background:#d1fae5;color:#065f46; }
        .badge-out      { background:#ede9fe;color:#4c1d95; }
        .badge-delivered{ background:#dcfce7;color:#14532d; }
        .badge-rejected { background:#fee2e2;color:#991b1b; }
    </style>
</head>
<body>
<div id="navbar-container"></div>

<main class="container" style="padding-top:2rem;">
    <div class="section-header" style="margin-bottom:2rem;">
        <h2>طلباتي</h2>
    </div>

    <div id="login-prompt" style="display:none; text-align:center; padding:4rem;">
        <p style="font-size:1.1rem; color:var(--text-muted);">سجّل الدخول لعرض سجل طلباتك.</p>
        <a href="login.html" class="btn btn-primary" style="margin-top:1rem;">تسجيل الدخول</a>
    </div>

    <div id="orders-container">
        <div class="loader">جاري التحميل...</div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="api/supabase.js"></script>
<script src="lib/utils.js"></script>
<script src="components/navbar.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
    if (window.NavbarComponent) NavbarComponent.render('navbar-container');

    const user = await API.auth.getUser().catch(() => null);
    if (!user) {
        document.getElementById('login-prompt').style.display = 'block';
        document.getElementById('orders-container').style.display = 'none';
        return;
    }

    const STATUS_LABELS = {
        pending:'قيد الانتظار', confirmed:'تم التأكيد', ready:'جاهز للشحن',
        out_for_delivery:'في الطريق', delivered:'تم التسليم', rejected:'مرفوض'
    };
    const STATUS_CLASS = {
        pending:'badge-pending', confirmed:'badge-confirmed', ready:'badge-ready',
        out_for_delivery:'badge-out', delivered:'badge-delivered', rejected:'badge-rejected'
    };

    function escHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    try {
        const orders = await API.orders.getMyOrders(user.id);
        const container = document.getElementById('orders-container');

        if (!orders.length) {
            container.innerHTML = `
                <div style="text-align:center;padding:4rem;">
                    <p style="font-size:1.2rem;color:var(--text-muted);">لا توجد طلبات سابقة.</p>
                    <a href="index.html" class="btn btn-primary" style="margin-top:1rem;">ابدأ التسوق</a>
                </div>`;
            return;
        }

        container.innerHTML = orders.map(order => {
            const items    = order.order_items || [];
            const store    = order.stores || {};
            const itemsHtml = items.map(i =>
                `<li>${escHtml(i.product_name)} × ${i.quantity} — ${Utils.formatCurrency(i.price * i.quantity)}</li>`
            ).join('');

            // Build reorder URL: open store page
            const reorderBtn = store.id
                ? `<a href="store.html?id=${store.id}" class="btn btn-outline" style="font-size:.85rem;padding:.4rem .9rem;">🔁 إعادة الطلب</a>`
                : '';

            return `
                <div class="order-card">
                    <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:.5rem;margin-bottom:.5rem;">
                        <h4>${escHtml(store.name || 'متجر')}</h4>
                        <span class="badge-status ${STATUS_CLASS[order.status] || ''}">${STATUS_LABELS[order.status] || order.status}</span>
                    </div>
                    <p style="font-size:.85rem;color:var(--text-muted);">
                        ${new Date(order.created_at).toLocaleString('ar-OM')}
                    </p>
                    <ul class="order-items-list">${itemsHtml}</ul>
                    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;margin-top:.75rem;border-top:1px dashed var(--border);padding-top:.75rem;">
                        <span>
                            <strong>${Utils.formatCurrency(order.total_price)}</strong>
                            + توصيل: ${order.is_free_delivery ? 'مجاني 🎁' : Utils.formatCurrency(order.delivery_fee)}
                        </span>
                        ${reorderBtn}
                    </div>
                </div>`;
        }).join('');

    } catch (err) {
        document.getElementById('orders-container').innerHTML =
            '<p style="color:var(--danger);text-align:center;padding:2rem;">تعذر تحميل الطلبات.</p>';
    }
});
</script>
</body>
</html>
