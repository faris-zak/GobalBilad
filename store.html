<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منتجات المتجر - جوب البلاد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <style>
        .store-header {
            background-color: var(--bg-card);
            padding: 2rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            margin-bottom: 2rem;
            text-align: center;
        }

        .product-card {
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1rem;
            background: var(--bg-card);
            box-shadow: var(--shadow-sm);
        }

        .product-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: var(--radius-sm);
            margin-bottom: 1rem;
            background-color: var(--bg-main);
        }

        .product-info h3 { margin-bottom: 0.5rem; font-size: 1.1rem; }
        .product-price { color: var(--primary); font-weight: bold; font-size: 1.25rem; }

        .qty-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 1rem;
            gap: 1rem;
        }

        .qty-btn {
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .qty-btn:hover { background: var(--border); }
        .qty-display { font-weight: bold; width: 30px; text-align: center; }
    </style>
</head>
<body>
    <div id="navbar-container"></div>

    <main class="container" style="padding-top: 2rem;">
        
        <div class="store-header" id="store-details">
            <h1 id="store-title">جاري تحميل المتجر...</h1>
            <p id="store-desc" class="text-muted">نحن هنا لخدمتك</p>
        </div>

        <section>
            <div class="section-header">
                <h2>المنتجات المتوفرة</h2>
            </div>
            
            <div id="products-grid" class="grid-layout">
                <div class="loader">جاري تحميل المنتجات...</div>
            </div>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="api/supabase.js"></script>
    <script src="lib/utils.js"></script>
    <script src="components/navbar.js"></script>
    <script src="assets/js/store.js"></script>
</body>
</html>
