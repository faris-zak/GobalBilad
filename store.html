<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>جوب البلاد | المتجر</title>

  <link rel="stylesheet" href="/assets/css/variables.css">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/utilities.css">

  <style>
    /* Store header banner */
    .store-header {
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-hover) 100%);
      color: #fff;
      padding: var(--space-8) var(--space-4);
    }
    .store-header-inner {
      max-width: var(--container-max);
      margin-inline: auto;
      display: flex;
      align-items: center;
      gap: var(--space-5);
      flex-wrap: wrap;
    }
    .store-header-icon {
      width: 72px;
      height: 72px;
      background: rgba(255,255,255,.2);
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      flex-shrink: 0;
    }
    .store-header-name  { font-size: var(--text-2xl); font-weight: var(--font-black); }
    .store-header-desc  { opacity: .85; margin-top: var(--space-1); }
    .store-header-phone { opacity: .75; font-size: var(--text-sm); margin-top: var(--space-1); }

    /* Floating cart bar at bottom */
    .cart-bar {
      position: fixed;
      bottom: 0;
      right: 0;
      left: 0;
      background: var(--color-primary);
      color: #fff;
      padding: var(--space-3) var(--space-4);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      z-index: var(--z-above);
      transform: translateY(100%);
      transition: transform var(--transition-normal);
      box-shadow: 0 -4px 16px rgba(0,0,0,.2);
    }
    .cart-bar.visible { transform: translateY(0); }
    .cart-bar-info { font-size: var(--text-sm); }
    .cart-bar-total { font-size: var(--text-lg); font-weight: var(--font-bold); direction: ltr; }

    /* Category group heading */
    .category-group { margin-bottom: var(--space-8); }
    .category-title {
      font-size: var(--text-lg);
      font-weight: var(--font-bold);
      color: var(--color-primary);
      margin-bottom: var(--space-4);
      padding-bottom: var(--space-2);
      border-bottom: 2px solid var(--color-primary-light);
    }
  </style>
</head>
<body class="page-wrapper">

  <div id="navbar"></div>

  <!-- Store Header (populated by JS) -->
  <div id="store-header"></div>

  <main class="page" style="padding-bottom: 80px">
    <div class="container">
      <div id="products-container"></div>
    </div>
  </main>

  <!-- Floating Cart Bar -->
  <div class="cart-bar" id="cart-bar">
    <div>
      <div class="cart-bar-info" id="cart-bar-info">0 منتجات</div>
      <div class="cart-bar-total" id="cart-bar-total">0.000 ر.ع.</div>
    </div>
    <a id="cart-bar-checkout" href="/cart.html" class="btn btn-secondary btn-sm">
      عرض السلة 🛒
    </a>
  </div>

  <footer class="footer">
    <div class="footer-brand">🏪 جوب البلاد</div>
    <p class="footer-copy">سوق المعمورة المحلي © 2025</p>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/lib/constants.js"></script>
  <script src="/lib/helpers.js"></script>
  <script src="/lib/validation.js"></script>
  <script src="/api/supabase.js"></script>
  <script src="/api/auth.js"></script>
  <script src="/api/stores.js"></script>
  <script src="/api/products.js"></script>
  <script src="/assets/js/cart.js"></script>
  <script src="/assets/js/location.js"></script>
  <script src="/assets/js/components.js"></script>
  <script src="/assets/js/app.js"></script>

  <script>
    const storeId = Helpers.getParam('id');
    let store     = null;

    // Navigate away if no store ID given
    if (!storeId) window.location.href = '/index.html';

    document.addEventListener('app:ready', initStorePage);

    async function initStorePage() {
      await Promise.all([loadStore(), loadProducts()]);
      // Listen for cart changes to update the bar
      document.addEventListener('cart:changed', updateCartBar);
      updateCartBar();
    }

    // ================================================================
    // Load store info
    // ================================================================
    async function loadStore() {
      try {
        store = await StoresAPI.getById(storeId);
        renderStoreHeader(store);
        document.title = `${store.name} | جوب البلاد`;
      } catch {
        document.getElementById('store-header').innerHTML =
          `<div class="container py-8"><p class="text-danger">تعذّر تحميل معلومات المتجر.</p></div>`;
      }
    }

    function renderStoreHeader(s) {
      const icons = { grocery:'🛒', restaurant:'🍽', bakery:'🥖', pharmacy:'💊', electronics:'📱', general:'🏪' };
      document.getElementById('store-header').innerHTML = `
        <div class="store-header">
          <div class="store-header-inner">
            <div class="store-header-icon">${icons[s.category] || '🏪'}</div>
            <div>
              <div class="store-header-name">${Helpers.escapeHtml(s.name)}</div>
              ${s.description ? `<div class="store-header-desc">${Helpers.escapeHtml(s.description)}</div>` : ''}
              <div class="store-header-phone">📞 ${Helpers.escapeHtml(s.phone)}</div>
            </div>
          </div>
        </div>
      `;
    }

    // ================================================================
    // Load & render products
    // ================================================================
    async function loadProducts() {
      const container = document.getElementById('products-container');
      container.innerHTML = Components.spinner();
      try {
        const products = await ProductsAPI.getByStore(storeId);
        window._currentProducts = products;

        if (!products.length) {
          container.innerHTML = Components.emptyState('📦', 'لا توجد منتجات متاحة حالياً');
          return;
        }

        // Group by category
        const groups = {};
        products.forEach(p => {
          const cat = p.category || 'عام';
          if (!groups[cat]) groups[cat] = [];
          groups[cat].push(p);
        });

        container.innerHTML = Object.entries(groups).map(([cat, items]) => `
          <div class="category-group">
            <div class="category-title">📌 ${Helpers.escapeHtml(cat)}</div>
            <div class="product-grid">
              ${items.map(p => Components.productCard(p, storeId, store?.name || '')).join('')}
            </div>
          </div>
        `).join('');

      } catch {
        container.innerHTML = Components.emptyState(
          '😕', 'تعذّر تحميل المنتجات',
          '', '<button class="btn btn-primary" onclick="loadProducts()">إعادة المحاولة</button>'
        );
      }
    }

    // ================================================================
    // Floating cart bar
    // ================================================================
    function updateCartBar() {
      const items    = Cart.getStoreItems(storeId);
      const count    = items.reduce((s, i) => s + i.quantity, 0);
      const subtotal = Cart.getStoreSubtotal(storeId);
      const bar      = document.getElementById('cart-bar');

      if (count === 0) {
        bar.classList.remove('visible');
        return;
      }

      document.getElementById('cart-bar-info').textContent  = `${count} منتج في السلة`;
      document.getElementById('cart-bar-total').textContent = Helpers.formatPrice(subtotal);
      bar.classList.add('visible');
    }
  </script>
</body>
</html>
