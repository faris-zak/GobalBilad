<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم — جوب البلاد</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <header class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <span class="logo-icon">🛒</span>
        <span class="logo-text">GobalBilad</span>
      </a>
      <button class="btn btn-outline" onclick="handleSignOut()">تسجيل الخروج</button>
    </div>
  </header>

  <div class="dashboard-layout">

    <div class="dashboard-header">
      <div>
        <h1 id="storeName">متجري</h1>
        <p id="storeViewLink" style="color:var(--text-light);font-size:14px;margin-top:4px;"></p>
      </div>
      <button class="btn btn-primary" onclick="openAddProduct()">+ إضافة منتج</button>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-number" id="productCount">—</div>
        <div class="stat-label">المنتجات</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">📲</div>
        <div class="stat-label">طلبات واتساب</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">✅</div>
        <div class="stat-label">المتجر نشط</div>
      </div>
    </div>

    <div>
      <div class="section-header">
        <h2>منتجاتك</h2>
        <a id="storePublicLink" href="#" target="_blank" class="btn btn-outline" style="padding:10px 16px;font-size:14px;">
          عرض المتجر العام ←
        </a>
      </div>
      <div id="productsList" class="product-list">
        <div class="loading">جاري تحميل المنتجات</div>
      </div>
    </div>

  </div>

  <div class="modal-overlay" id="productModal">
    <div class="modal">
      <h2 id="modalTitle">إضافة منتج</h2>

      <div class="form-group">
        <label for="productName">اسم المنتج *</label>
        <input type="text" id="productName" placeholder="مثال: خبز أبيض طازج" />
      </div>

      <div class="form-group">
        <label for="productPrice">السعر (ر.ع) *</label>
        <input type="number" id="productPrice" placeholder="0.500" step="0.001" min="0" />
      </div>

      <div class="form-group">
        <label for="productDescription">الوصف</label>
        <textarea id="productDescription" placeholder="اكتب وصفًا للمنتج..."></textarea>
      </div>

      <div class="form-group">
        <label for="productImageUrl">رابط الصورة (اختياري)</label>
        <input type="url" id="productImageUrl" placeholder="https://..." />
        <p style="font-size:12px;color:var(--text-light);margin-top:4px;">
          نصيحة: ارفع الصورة على موقع مجاني مثل <a href="https://imgur.com" target="_blank" style="color:var(--green)">imgur.com</a> ثم الصق الرابط
        </p>
      </div>

      <div class="form-actions">
        <button class="btn btn-outline" onclick="closeModal()">إلغاء</button>
        <button class="btn btn-primary" id="saveProductBtn" onclick="saveProduct()">حفظ المنتج</button>
      </div>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
  <script>
    let editingProductId = null;

    document.addEventListener('DOMContentLoaded', async function() {
      const user = await getCurrentUser();
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      loadDashboard(user);
    });

    function openAddProduct() {
      editingProductId = null;
      document.getElementById('modalTitle').textContent = 'إضافة منتج';
      document.getElementById('saveProductBtn').textContent = 'إضافة منتج';
      clearForm();
      document.getElementById('productModal').classList.add('open');
    }

    function openEditProduct(product) {
      editingProductId = product.id;
      document.getElementById('modalTitle').textContent = 'تعديل المنتج';
      document.getElementById('saveProductBtn').textContent = 'حفظ التعديلات';
      document.getElementById('productName').value        = product.name;
      document.getElementById('productPrice').value       = product.price;
      document.getElementById('productDescription').value = product.description || '';
      document.getElementById('productImageUrl').value    = product.image_url || '';
      document.getElementById('productModal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('productModal').classList.remove('open');
      clearForm();
    }

    function clearForm() {
      document.getElementById('productName').value = '';
      document.getElementById('productPrice').value = '';
      document.getElementById('productDescription').value = '';
      document.getElementById('productImageUrl').value = '';
    }

    async function saveProduct() {
      const name        = document.getElementById('productName').value.trim();
      const price       = parseFloat(document.getElementById('productPrice').value);
      const description = document.getElementById('productDescription').value.trim();
      const image_url   = document.getElementById('productImageUrl').value.trim();

      if (!name || isNaN(price) || price < 0) {
        alert('يرجى إدخال اسم المنتج وسعر صحيح.');
        return;
      }

      const btn = document.getElementById('saveProductBtn');
      btn.textContent = 'جاري الحفظ...';
      btn.disabled = true;

      try {
        if (editingProductId) {
          await updateProduct(editingProductId, { name, price, description, image_url });
        } else {
          await addProduct({ name, price, description, image_url });
        }
        closeModal();
        const user = await getCurrentUser();
        loadDashboard(user);
      } catch (err) {
        alert('خطأ أثناء حفظ المنتج: ' + err.message);
      } finally {
        btn.textContent = editingProductId ? 'حفظ التعديلات' : 'إضافة منتج';
        btn.disabled = false;
      }
    }

    document.getElementById('productModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
  </script>
  <p class="developer-sign">توقيع المطور: الفارس بن مجاهد الزكواني للتواصل: 93281000</p>
</body>
</html>
