<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - جوب البلاد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/components.css">
</head>
<body>
    <div id="navbar-container"></div>

    <main class="container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>أهلاً بك 👋</h2>
                <p>قم بتسجيل الدخول للبدء</p>
            </div>

            <!-- Customer Google Auth -->
            <button id="btn-google-login" class="btn btn-primary btn-block flex-center" style="background-color: #4285F4; border-color: #4285F4;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg" style="margin-left:8px;">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                تسجيل الدخول كعميل
            </button>

            <div class="divider">أو</div>

            <!-- Store / Driver Email Form -->
            <form id="auth-form">
                <div class="input-group">
                    <label class="input-label">البريد الإلكتروني</label>
                    <input type="email" id="email" class="input-field" placeholder="email@example.com" required>
                </div>
                <div class="input-group">
                    <label class="input-label">كلمة المرور</label>
                    <input type="password" id="password" class="input-field" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-secondary btn-block">
                    دخول (تاجر / مندوب)
                </button>
            </form>
            
            <p style="text-align: center; margin-top: 1rem; font-size: 0.9rem; color: var(--text-muted);">
                ليس لديك حساب تاجر؟ <a href="#" style="color: var(--primary);">تواصل مع الإدارة للتسجيل</a>
            </p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="api/supabase.js"></script>
    <script src="components/navbar.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
             if (window.NavbarComponent) NavbarComponent.render('navbar-container');
        });
    </script>
</body>
</html>
