<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جوب البلاد - الرئيسية</title>
    <!-- Modern Arabic Font -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <!-- Meta tags for SEO -->
    <meta name="description" content="جوب البلاد - المنصة الأولى للتسوق المحلي في المعمورة">
    <meta property="og:title" content="جوب البلاد">
    <meta property="og:description" content="تسوق من المتاجر المحلية في المعمورة بكل سهولة">
</head>
<body>
    <!-- Navbar placeholder -->
    <div id="navbar-container"></div>

    <main class="container">
        <header class="hero">
            <h1>أهلاً بك في جوب البلاد</h1>
            <p>منصتك المحلية للتسوق من أسواق ومتاجر المعمورة</p>
            <div id="location-status" class="status-badge checking">جارِ التحقق من الموقع...</div>
        </header>

        <section class="stores-section">
            <div class="section-header">
                <h2>المتاجر المتاحة</h2>
                <input type="text" id="search-stores" placeholder="ابحث عن متجر..." class="input-field">
            </div>
            
            <!-- Stores Grid -->
            <div id="stores-grid" class="grid-layout">
                <div class="loader">جاري تحميل المتاجر...</div>
            </div>
        </section>
    </main>

    <!-- Footer placeholder -->
    <div id="footer-container"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="api/supabase.js"></script>
    <script src="lib/utils.js"></script>
    <script src="components/navbar.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
