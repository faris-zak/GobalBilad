<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>جوب البلاد | إتمام الطلب</title>

  <link rel="stylesheet" href="/assets/css/variables.css">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/utilities.css">

  <style>
    .checkout-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-6);
    }
    @media (min-width: 768px) {
      .checkout-layout { grid-template-columns: 1fr 360px; }
    }
    .order-success {
      display: none;
      text-align: center;
      padding: var(--space-12) var(--space-6);
    }
    .order-success .success-icon { font-size: 5rem; margin-bottom: var(--space-4); }
    .order-success .success-title {
      font-size: var(--text-2xl);
      font-weight: var(--font-bold);
      color: var(--color-success);
      margin-bottom: var(--space-4);
    }
  </style>
</head>
<body class="page-wrapper">

  <div id="navbar"></div>

  <main class="page">
    <div class="container" style="max-width: 900px">

      <!-- Success state (hidden until order placed) -->
      <div class="order-success" id="order-success">
        <div class="success-icon">✅</div>
        <div class="success-title">تم إرسال طلبك بنجاح!</div>
        <p class="text-secondary" id="order-success-id"></p>
        <p class="text-muted mt-4 mb-6">
          سيتواصل معك المتجر قريباً لتأكيد طلبك.
        </p>
        <div class="flex gap-3 justify-center flex-wrap mt-4">
          <button class="btn btn-secondary" id="send-whatsapp-btn">
            📱 إرسال الطلب عبر واتساب
          </button>
          <a href="/orders.html" class="btn btn-outline">عرض طلباتي</a>
          <a href="/index.html" class="btn btn-ghost">العودة للرئيسية</a>
        </div>
      </div>

      <!-- Checkout Form -->
      <div id="checkout-form-section">
        <div class="page-header">
          <h1 class="page-title">إتمام الطلب</h1>
          <p class="page-subtitle" id="checkout-store-name"></p>
        </div>

        <div class="checkout-layout">

          <!-- Left: Form -->
          <div>
            <div class="card">
              <div class="card-header">
                <span class="card-title">بيانات التسليم</span>
              </div>
              <div class="card-body">
                <form id="checkout-form" novalidate>

                  <div class="form-group">
                    <label for="c-name">الاسم الكامل *</label>
                    <input type="text" id="c-name" placeholder="أدخل اسمك الكامل" required>
                    <span class="field-error" id="c-name_error"></span>
                  </div>

                  <div class="form-group">
                    <label for="c-phone">رقم الهاتف *</label>
                    <input type="tel" id="c-phone" placeholder="9XXXXXXX" required dir="ltr">
                    <span class="field-error" id="c-phone_error"></span>
                  </div>

                  <div class="form-group">
                    <label for="c-location">رابط موقعك على Google Maps *</label>
                    <input type="url" id="c-location" placeholder="https://maps.google.com/..." dir="ltr">
                    <span class="field-error" id="c-location_error"></span>
                    <p class="field-hint">
                      افتح <a href="https://maps.google.com" target="_blank" rel="noopener"
                        style="color:var(--color-primary)">Google Maps</a>
                      → ابحث عن موقعك → شارك الرابط هنا.
                    </p>
                  </div>

                  <div class="form-group">
                    <label for="c-notes">ملاحظات (اختياري)</label>
                    <textarea id="c-notes" placeholder="أي تعليمات خاصة..." rows="3"></textarea>
                  </div>

                  <div id="free-delivery-note" class="alert alert-success" style="display:none">
                    <span class="alert-icon">🎁</span>
                    <span>يسعدنا تقديم التوصيل مجاناً لطلبك الأول!</span>
                  </div>

                  <button type="submit" class="btn btn-primary btn-full btn-lg mt-4" id="place-order-btn">
                    تأكيد الطلب
                  </button>
                </form>
              </div>
            </div>
          </div>

          <!-- Right: Order Summary -->
          <div>
            <div class="card" style="position:sticky;top:80px">
              <div class="card-header">
                <span class="card-title">ملخص الطلب</span>
              </div>
              <div class="card-body" id="order-summary"></div>
            </div>
          </div>

        </div>
      </div>

    </div>
  </main>

  <footer class="footer">
    <div class="footer-brand">🏪 جوب البلاد</div>
    <p class="footer-copy">سوق المعمورة المحلي © 2025</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/lib/constants.js"></script>
  <script src="/lib/helpers.js"></script>
  <script src="/lib/validation.js"></script>
  <script src="/api/supabase.js"></script>
  <script src="/api/auth.js"></script>
  <script src="/api/stores.js"></script>
  <script src="/api/orders.js"></script>
  <script src="/assets/js/cart.js"></script>
  <script src="/assets/js/location.js"></script>
  <script src="/assets/js/whatsapp.js"></script>
  <script src="/assets/js/components.js"></script>
  <script src="/assets/js/app.js"></script>

  <script>
    const storeId = Helpers.getParam('store');
    if (!storeId) window.location.href = '/cart.html';

    let store          = null;
    let isFreeDelivery = false;
    let placedOrder    = null;

    document.addEventListener('app:ready', initCheckout);

    async function initCheckout() {
      // Must be logged in
      if (!App.profile) {
        window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.pathname + window.location.search);
        return;
      }

      const items = Cart.getStoreItems(storeId);
      if (!items.length) {
        window.location.href = '/cart.html';
        return;
      }

      // Load store + free delivery status in parallel
      [store, isFreeDelivery] = await Promise.all([
        StoresAPI.getById(storeId),
        OrdersAPI.isFreeDeliveryEligible(),
      ]);

      document.getElementById('checkout-store-name').textContent = store.name;

      // Pre-fill user data
      const profile = App.profile;
      if (profile.name)  document.getElementById('c-name').value  = profile.name;
      if (profile.phone) document.getElementById('c-phone').value = profile.phone;

      if (isFreeDelivery) {
        document.getElementById('free-delivery-note').style.display = 'flex';
      }

      renderOrderSummary(items);

      document.getElementById('checkout-form').addEventListener('submit', handlePlaceOrder);
    }

    // ================================================================
    // Order summary sidebar
    // ================================================================
    function renderOrderSummary(items) {
      const subtotal = items.reduce((s, i) => s + parseFloat(i.price) * i.quantity, 0);
      const feeInfo  = Helpers.calcDeliveryFee(subtotal, isFreeDelivery);

      document.getElementById('order-summary').innerHTML = `
        <div class="order-items-list">
          ${items.map(i => `
            <div class="order-item-row">
              <span>${Helpers.escapeHtml(i.name)} × ${i.quantity}</span>
              <span class="ltr">${Helpers.formatPrice(parseFloat(i.price) * i.quantity)}</span>
            </div>
          `).join('')}
        </div>
        <div class="order-totals">
          <div class="total-line">
            <span>إجمالي المنتجات</span>
            <span class="ltr">${Helpers.formatPrice(subtotal)}</span>
          </div>
          <div class="total-line">
            <span>التوصيل</span>
            <span class="ltr" style="color:${feeInfo?.isFree ? 'var(--color-success)' : ''}">
              ${feeInfo?.isFree ? 'مجاني 🎁' : Helpers.formatPrice(feeInfo?.fee || 0)}
            </span>
          </div>
          <div class="total-line total-grand">
            <span>الإجمالي الكلي</span>
            <span class="ltr">${Helpers.formatPrice(subtotal + (feeInfo?.fee || 0))}</span>
          </div>
        </div>
      `;
    }

    // ================================================================
    // Place Order
    // ================================================================
    async function handlePlaceOrder(e) {
      e.preventDefault();

      const nameEl     = document.getElementById('c-name');
      const phoneEl    = document.getElementById('c-phone');
      const locationEl = document.getElementById('c-location');
      const btn        = document.getElementById('place-order-btn');

      // Validate
      const validName     = Validation.field(nameEl,     Validation.name.bind(Validation));
      const validPhone    = Validation.field(phoneEl,    Validation.phone.bind(Validation));
      const validLocation = Validation.field(locationEl, Validation.locationLink.bind(Validation));
      if (!validName || !validPhone || !validLocation) return;

      const items    = Cart.getStoreItems(storeId);
      const subtotal = items.reduce((s, i) => s + parseFloat(i.price) * i.quantity, 0);
      const feeInfo  = Helpers.calcDeliveryFee(subtotal, isFreeDelivery);

      if (!feeInfo) {
        Toast.error('الطلب يتجاوز الحد المسموح (50 ر.ع.). يرجى تخفيض الكمية.');
        return;
      }

      Helpers.btnLoading(btn, true, 'جاري إرسال الطلب...');
      try {
        placedOrder = await OrdersAPI.create({
          storeId,
          totalPrice:    subtotal,
          deliveryFee:   feeInfo.fee,
          isFreeDelivery: feeInfo.isFree,
          customerName:  nameEl.value.trim(),
          customerPhone: phoneEl.value.trim(),
          locationLink:  locationEl.value.trim(),
          notes:         document.getElementById('c-notes').value.trim(),
        }, items.map(i => ({
          productId:   i.id,
          product_name: i.name,
          quantity:    i.quantity,
          price:       i.price,
        })));

        // Clear store cart
        Cart.clearStore(storeId);

        // Show success
        document.getElementById('checkout-form-section').style.display = 'none';
        const successEl = document.getElementById('order-success');
        successEl.style.display = 'block';
        document.getElementById('order-success-id').textContent =
          `رقم الطلب: #${placedOrder.id.slice(0, 8).toUpperCase()}`;

        // Wire WhatsApp button
        document.getElementById('send-whatsapp-btn').onclick = () => {
          WhatsApp.sendOrderToStore(placedOrder, store, items.map(i => ({
            product_name: i.name,
            quantity:     i.quantity,
            price:        parseFloat(i.price),
          })));
        };

        Toast.success('تم إرسال طلبك بنجاح!');
      } catch (err) {
        Toast.error('حدث خطأ أثناء إرسال الطلب. يرجى المحاولة مجدداً.');
        console.error(err);
      } finally {
        Helpers.btnLoading(btn, false);
      }
    }
  </script>
</body>
</html>
