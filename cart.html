<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة المشتريات - جوب البلاد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <style>
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
        }
        .cart-item h4 { margin-bottom: 0.25rem; font-size: 1.1rem; }
        .cart-item p { color: var(--primary); font-weight: bold; }
        .summary-box {
            background-color: var(--bg-card);
            padding: 2rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            margin-top: 2rem;
        }
        .summary-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }
        .summary-total {
            border-top: 2px solid var(--border);
            padding-top: 1rem;
            font-weight: bold;
            font-size: 1.25rem;
            color: var(--primary-dark);
        }
    </style>
</head>
<body>
    <div id="navbar-container"></div>

    <main class="container">
        
        <div class="section-header" style="margin-top: 2rem;">
            <h2>سلة المشتريات</h2>
        </div>

        <div id="cart-empty-msg" style="display: none; text-align: center; padding: 4rem;">
            <p style="font-size: 1.25rem; color: var(--text-muted);">سلتك فارغة حالياً</p>
            <a href="index.html" class="btn btn-primary" style="margin-top: 1rem;">العودة للتسوق</a>
        </div>

        <div id="cart-content" style="display: none;">
            
            <div id="cart-items-list">
                <!-- Items grouped by store will appear here -->
            </div>

            <div class="summary-box">
                <h3 style="margin-bottom: 1.5rem; font-weight: 800;">إتمام الطلب</h3>
                
                <!-- Checkout Form -->
                <form id="checkout-form">
                    <div class="input-group">
                        <label class="input-label">الاسم الكامل</label>
                        <input type="text" id="cust-name" class="input-field" placeholder="محمد أحمد" required>
                    </div>
                    <div class="input-group">
                        <label class="input-label">رقم الهاتف (واتساب)</label>
                        <input type="tel" id="cust-phone" class="input-field" placeholder="9xxxxxxxx" required>
                    </div>
                    
                    <div class="input-group">
                        <label class="input-label">الموقع (رابط جوجل ماب)</label>
                        <div style="display: flex; gap: 0.5rem;">
                            <input type="url" id="cust-location" class="input-field" placeholder="https://maps.google.com/..." required>
                            <button type="button" class="btn btn-outline" id="btn-get-location" style="flex-shrink: 0;" title="تحديد موقعي الحالي">📍</button>
                        </div>
                        <small style="color: var(--text-muted);">يرجى التأكد من أن الموقع داخل منطقة المعمورة</small>
                    </div>

                    <hr class="divider" style="margin: 2rem 0;">

                    <div id="price-summary">
                        <div class="summary-line">
                            <span>قيمة المنتجات:</span>
                            <span id="subtotal-val">0.000 ر.ع</span>
                        </div>
                        <div class="summary-line">
                            <span>رسوم التوصيل:</span>
                            <span id="delivery-val">0.000 ر.ع</span>
                        </div>
                        <div class="summary-line summary-total">
                            <span>الإجمالي:</span>
                            <span id="total-val">0.000 ر.ع</span>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1.5rem; font-size: 1.1rem; padding: 1rem;">
                        تأكيد الطلب وإرسال عبر واتساب
                    </button>
                </form>

            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="api/supabase.js"></script>
    <script src="lib/utils.js"></script>
    <script src="components/navbar.js"></script>
    <script src="assets/js/cart.js"></script> <!-- Will be created below -->
</body>
</html>
