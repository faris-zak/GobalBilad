<body class="admin-page">
  <site-header></site-header>

  <main class="admin-main">
    <section class="admin-shell reveal">
      <header class="admin-hero">
        <div>
          <p class="admin-eyebrow">منطقة محمية</p>
          <h1>لوحة الإدارة</h1>
          <p>إدارة المستخدمين واستقبال رسائل صفحة تواصل معنا.</p>
        </div>
        <div class="admin-hero-actions">
          <button id="seedStoresBtn" class="btn btn-primary" type="button">تهيئة بيانات المتاجر</button>
          <button id="refreshDashboardBtn" class="btn btn-outline" type="button">تحديث البيانات</button>
        </div>
      </header>

      <section class="admin-kpis" aria-label="ملخص سريع">
        <article class="admin-kpi-card">
          <span>إجمالي المستخدمين</span>
          <strong id="kpiUsers">0</strong>
        </article>
        <article class="admin-kpi-card">
          <span>الحسابات المحظورة</span>
          <strong id="kpiBanned">0</strong>
        </article>
        <article class="admin-kpi-card">
          <span>رسائل جديدة</span>
          <strong id="kpiNewMessages">0</strong>
        </article>
        <article class="admin-kpi-card">
          <span>طلبات الأدوار المعلقة</span>
          <strong id="kpiPendingApplications">0</strong>
        </article>
      </section>

      <p id="adminStatus" class="admin-status" aria-live="polite"></p>

      <div class="admin-grid">
        <section class="admin-panel admin-users-panel" aria-label="إدارة المستخدمين">
          <div class="admin-panel-head">
            <h2>المستخدمون</h2>
          </div>

          <div class="admin-filters">
            <label class="admin-filter-field">
              <span>بحث</span>
              <input id="usersSearchInput" type="search" placeholder="الاسم / البريد / الهاتف" />
            </label>
            <label class="admin-filter-field">
              <span>الدور</span>
              <select id="usersRoleFilter">
                <option value="">الكل</option>
                <option value="admin">Admin</option>
                <option value="user">User</option>
                <option value="trader">Trader</option>
                <option value="delivery">Delivery</option>
              </select>
            </label>
            <label class="admin-filter-field">
              <span>الحالة</span>
              <select id="usersStatusFilter">
                <option value="">الكل</option>
                <option value="active">نشط</option>
                <option value="banned">محظور</option>
              </select>
            </label>
          </div>

          <div id="usersList" class="admin-list"></div>
        </section>

        <section class="admin-panel admin-applications-panel" aria-label="طلبات الانضمام">
          <div class="admin-panel-head">
            <h2>طلبات الانضمام (تاجر/مندوب)</h2>
          </div>

          <div class="admin-filters">
            <label class="admin-filter-field">
              <span>حالة الطلب</span>
              <select id="applicationsStatusFilter">
                <option value="">الكل</option>
                <option value="pending">قيد المراجعة</option>
                <option value="approved">مقبول</option>
                <option value="rejected">مرفوض</option>
              </select>
            </label>
            <label class="admin-filter-field">
              <span>نوع الطلب</span>
              <select id="applicationsRoleFilter">
                <option value="">الكل</option>
                <option value="trader">تاجر</option>
                <option value="delivery">مندوب</option>
              </select>
            </label>
            <div></div>
          </div>

          <div id="applicationsList" class="admin-list"></div>
        </section>

        <section class="admin-panel admin-messages-panel" aria-label="رسائل التواصل">
          <div class="admin-panel-head">
            <h2>رسائل التواصل</h2>
            <label class="admin-filter-field admin-filter-inline">
              <span>الحالة</span>
              <select id="messagesStatusFilter">
                <option value="">الكل</option>
                <option value="new">جديدة</option>
                <option value="read">مقروءة</option>
                <option value="resolved">مغلقة</option>
              </select>
            </label>
          </div>

          <div id="messagesList" class="admin-list"></div>
        </section>
      </div>
    </section>
  </main>
