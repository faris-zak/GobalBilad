  <style>
    /* ── Layout ── */
    .trader-page {
      max-width: 900px;
      margin: 2.5rem auto;
      padding: 0 1rem 4rem;
    }
    .trader-title {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 1.5rem;
    }

    /* ── Tabs ── */
    .trader-tabs {
      display: flex;
      gap: 0.5rem;
      border-bottom: 2px solid var(--border);
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .trader-tab-btn {
      background: none;
      border: none;
      padding: 0.6rem 1.2rem;
      font-size: 0.95rem;
      font-family: var(--font-body);
      color: var(--text-mid);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .trader-tab-btn.active {
      color: var(--green);
      border-bottom-color: var(--green);
      font-weight: 600;
    }
    .trader-tab-panel { display: none; }
    .trader-tab-panel.active { display: block; }

    /* ── Notice / Toast ── */
    .trader-notice {
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      margin-bottom: 1rem;
      display: none;
    }
    .trader-notice.ok  { background: #e8f5e9; color: #2e7d32; display: block; }
    .trader-notice.err { background: #fdecea; color: #c62828; display: block; }

    /* ── Cards / Forms ── */
    .trader-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow);
    }
    .trader-card-title {
      font-weight: 600;
      font-size: 1rem;
      color: var(--text-dark);
      margin-bottom: 1rem;
    }
    .trader-field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-bottom: 1rem;
    }
    .trader-field label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-mid);
    }
    .trader-field input {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.55rem 0.75rem;
      font-size: 0.95rem;
      font-family: var(--font-body);
      color: var(--text-dark);
      background: #fafafa;
      transition: border-color 0.2s;
      width: 100%;
      box-sizing: border-box;
    }
    .trader-field input:focus {
      outline: none;
      border-color: var(--green);
      background: var(--white);
    }
    .trader-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.4rem;
      border-radius: 999px;
      border: none;
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .trader-btn:active { transform: scale(0.97); }
    .trader-btn:disabled { opacity: 0.55; pointer-events: none; }
    .trader-btn-primary { background: var(--green); color: var(--white); }
    .trader-btn-secondary { background: var(--sand); color: var(--text-dark); }
    .trader-btn-danger { background: #fdecea; color: #c62828; }
    .trader-btn-sm {
      padding: 0.35rem 0.9rem;
      font-size: 0.8rem;
    }

    /* ── Store info display ── */
    .store-info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .store-info-name {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-dark);
    }
    .store-info-phone {
      font-size: 0.9rem;
      color: var(--text-mid);
    }
    .store-status-badge {
      font-size: 0.78rem;
      font-weight: 600;
      padding: 0.2rem 0.7rem;
      border-radius: 999px;
    }
    .store-status-badge.active   { background: #e8f5e9; color: #2e7d32; }
    .store-status-badge.inactive { background: var(--sand); color: var(--text-mid); }

    /* ── Products list ── */
    .products-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .product-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      flex-wrap: wrap;
    }
    .product-row-name { flex: 1; font-weight: 600; font-size: 0.92rem; color: var(--text-dark); }
    .product-row-price { font-size: 0.88rem; color: var(--text-mid); white-space: nowrap; }
    .product-avail-badge {
      font-size: 0.75rem;
      padding: 0.15rem 0.6rem;
      border-radius: 999px;
    }
    .product-avail-badge.yes { background: #e8f5e9; color: #2e7d32; }
    .product-avail-badge.no  { background: var(--sand); color: var(--text-mid); }
    .product-row-actions { display: flex; gap: 0.5rem; }

    /* ── Inline edit form ── */
    .product-edit-form {
      display: none;
      flex-direction: column;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      background: #fafafa;
      border: 1px solid var(--green-light, #a5d6a7);
      border-radius: var(--radius-sm);
      margin-top: 0.5rem;
    }
    .product-edit-form.open { display: flex; }
    .product-edit-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    .product-edit-row .trader-field { flex: 1; min-width: 120px; margin-bottom: 0; }

    /* ── Orders ── */
    .orders-filter {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .filter-pill {
      padding: 0.35rem 1rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--white);
      font-size: 0.82rem;
      font-family: var(--font-body);
      cursor: pointer;
      color: var(--text-mid);
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .filter-pill.active {
      background: var(--green);
      color: var(--white);
      border-color: var(--green);
    }
    .order-trader-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
    }
    .order-trader-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .order-trader-id { font-size: 0.78rem; color: var(--text-light); }
    .order-status-badge {
      font-size: 0.78rem;
      font-weight: 600;
      padding: 0.2rem 0.8rem;
      border-radius: 999px;
    }
    .order-status-badge.pending   { background: #fff8e1; color: #f57f17; }
    .order-status-badge.confirmed { background: #e8f5e9; color: #2e7d32; }
    .order-status-badge.cancelled { background: #fdecea; color: #c62828; }
    .order-trader-meta {
      font-size: 0.88rem;
      color: var(--text-mid);
      line-height: 1.7;
      margin-bottom: 0.75rem;
    }
    .order-trader-meta strong { color: var(--text-dark); }
    .order-items-list {
      list-style: none;
      padding: 0;
      margin: 0 0 0.75rem;
      font-size: 0.85rem;
    }
    .order-items-list li {
      display: flex;
      justify-content: space-between;
      padding: 0.2rem 0;
      color: var(--text-dark);
      border-bottom: 1px solid var(--border);
    }
    .order-items-list li:last-child { border-bottom: none; }
    .order-trader-total {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--text-dark);
      text-align: left;
      margin-bottom: 0.75rem;
    }
    .order-trader-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .order-location-link {
      font-size: 0.8rem;
      color: var(--green);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }
    .order-location-link:hover { text-decoration: underline; }
    .empty-state {
      text-align: center;
      color: var(--text-mid);
      padding: 2.5rem 1rem;
      font-size: 0.95rem;
    }
    .loading-state {
      text-align: center;
      color: var(--text-mid);
      padding: 1.5rem;
      font-size: 0.9rem;
    }

    /* ── Toggle switch for store active ── */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.25rem;
    }
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.25s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      right: 3px; top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.25s;
    }
    .toggle-switch input:checked + .toggle-slider { background: var(--green); }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(-20px); }
    .toggle-label { font-size: 0.88rem; color: var(--text-mid); }
  </style>

<body>
  <div id="siteHeaderMount"></div>

  <main class="trader-page" id="traderPage" style="display:none">
    <h1 class="trader-title">لوحة التاجر</h1>

    <div class="trader-notice" id="globalNotice"></div>

    <!-- ── Tabs ── -->
    <nav class="trader-tabs" id="traderTabs">
      <button class="trader-tab-btn active" data-tab="storeTab">🏪 متجري</button>
      <button class="trader-tab-btn"        data-tab="productsTab">📦 المنتجات</button>
      <button class="trader-tab-btn"        data-tab="ordersTab">📋 الطلبات</button>
    </nav>

    <!-- ══════════ TAB 1: متجري ══════════ -->
    <section class="trader-tab-panel active" id="storeTab">
      <div class="loading-state" id="storeLoading">جارٍ التحميل…</div>

      <!-- Create form (shown when no store) -->
      <div class="trader-card" id="createStoreCard" style="display:none">
        <p class="trader-card-title">إنشاء متجر جديد</p>
        <div class="trader-field">
          <label for="newStoreName">اسم المتجر</label>
          <input type="text" id="newStoreName" placeholder="مثال: متجر الخير" maxlength="100" />
        </div>
        <div class="trader-field">
          <label for="newStorePhone">رقم واتساب</label>
          <input type="tel" id="newStorePhone" placeholder="+9647XXXXXXXXX" maxlength="20" />
        </div>
        <button class="trader-btn trader-btn-primary" id="createStoreBtn" onclick="createStore()">إنشاء المتجر</button>
      </div>

      <!-- Existing store display + edit -->
      <div class="trader-card" id="existingStoreCard" style="display:none">
        <div class="store-info-row" id="storeInfoDisplay">
          <div>
            <div class="store-info-name" id="dispStoreName"></div>
            <div class="store-info-phone" id="dispStorePhone"></div>
          </div>
          <span class="store-status-badge" id="dispStoreBadge"></span>
        </div>

        <!-- Edit form (collapsed by default) -->
        <div id="storeEditForm" style="display:none; margin-top:1.25rem; padding-top:1rem; border-top:1px solid var(--border)">
          <p class="trader-card-title" style="margin-bottom:0.75rem">تعديل بيانات المتجر</p>
          <div class="trader-field">
            <label for="editStoreName">اسم المتجر</label>
            <input type="text" id="editStoreName" maxlength="100" />
          </div>
          <div class="trader-field">
            <label for="editStorePhone">رقم واتساب</label>
            <input type="tel" id="editStorePhone" maxlength="20" />
          </div>
          <div class="toggle-row" style="margin-bottom:1rem">
            <label class="toggle-switch">
              <input type="checkbox" id="editStoreActive" />
              <span class="toggle-slider"></span>
            </label>
            <span class="toggle-label">المتجر نشط (مرئي للعملاء)</span>
          </div>
          <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
            <button class="trader-btn trader-btn-primary" onclick="saveStore()">حفظ التغييرات</button>
            <button class="trader-btn trader-btn-secondary" onclick="toggleStoreEditForm(false)">إلغاء</button>
          </div>
        </div>

        <div style="margin-top:1rem;display:flex;gap:0.5rem;flex-wrap:wrap" id="storeActionBtns">
          <button class="trader-btn trader-btn-secondary" onclick="toggleStoreEditForm(true)">✏️ تعديل</button>
          <a class="trader-btn trader-btn-secondary" id="viewStoreLink" href="#" target="_blank">🔗 عرض المتجر</a>
        </div>
      </div>
    </section>

    <!-- ══════════ TAB 2: المنتجات ══════════ -->
    <section class="trader-tab-panel" id="productsTab">
      <div class="trader-card">
        <p class="trader-card-title">إضافة منتج جديد</p>
        <div class="product-edit-row">
          <div class="trader-field" style="flex:2;min-width:160px">
            <label for="newProductName">اسم المنتج</label>
            <input type="text" id="newProductName" placeholder="مثال: دجاج مشوي" maxlength="120" />
          </div>
          <div class="trader-field" style="flex:1;min-width:100px">
            <label for="newProductPrice">السعر (د.ع)</label>
            <input type="number" id="newProductPrice" placeholder="0" min="0" step="250" />
          </div>
        </div>
        <button class="trader-btn trader-btn-primary" onclick="addProduct()">إضافة المنتج</button>
      </div>

      <div class="loading-state" id="productsLoading" style="display:none">جارٍ التحميل…</div>
      <div class="products-list" id="productsList"></div>
    </section>

    <!-- ══════════ TAB 3: الطلبات ══════════ -->
    <section class="trader-tab-panel" id="ordersTab">
      <div class="orders-filter" id="ordersFilter">
        <button class="filter-pill active" data-status="">الكل</button>
        <button class="filter-pill" data-status="pending">قيد الانتظار</button>
        <button class="filter-pill" data-status="confirmed">مؤكدة</button>
        <button class="filter-pill" data-status="cancelled">ملغاة</button>
      </div>
      <div class="loading-state" id="ordersLoading" style="display:none">جارٍ التحميل…</div>
      <div id="ordersList"></div>
    </section>
  </main>

  <!-- Auth-guard loader (hidden) -->
  <div id="authGuard" style="text-align:center;padding:4rem 1rem;color:var(--text-mid);font-size:0.95rem">
    جارٍ التحقق من الصلاحيات…
  </div>

  <script>
    // ─── State ───────────────────────────────────────────────────────────────
    let accessToken = null;
    let currentStore = null;
    let currentOrderFilter = '';
    let editingProductId = null;

    // ─── Helpers ─────────────────────────────────────────────────────────────
    function notice(msg, type = 'ok') {
      const el = document.getElementById('globalNotice');
      el.textContent = msg;
      el.className = 'trader-notice ' + type;
      setTimeout(() => { el.className = 'trader-notice'; }, 4500);
    }

    async function apiFetch(path, method = 'GET', body = null) {
      const opts = {
        method,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + accessToken
        }
      };
      if (body !== null) opts.body = JSON.stringify(body);
      const res = await fetch(path, opts);
      const data = await res.json().catch(() => ({}));
      return { ok: res.ok, status: res.status, data };
    }

    function fmtPrice(p) {
      return Number(p).toLocaleString('ar-IQ') + ' د.ع';
    }

    function fmtDate(d) {
      if (!d) return '';
      return new Date(d).toLocaleString('ar-IQ', { dateStyle: 'short', timeStyle: 'short' });
    }

    // ─── Tabs ─────────────────────────────────────────────────────────────────
    document.getElementById('traderTabs').addEventListener('click', (e) => {
      const btn = e.target.closest('.trader-tab-btn');
      if (!btn) return;
      const tabId = btn.dataset.tab;
      document.querySelectorAll('.trader-tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.trader-tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(tabId).classList.add('active');
      if (tabId === 'productsTab' && currentStore) loadProducts();
      if (tabId === 'ordersTab' && currentStore) loadOrders();
    });

    // ─── AUTH GUARD ───────────────────────────────────────────────────────────
    async function boot() {
      try {
        const session = await checkSession();
        if (!session) {
          window.location.href = '/login';
          return;
        }
        const token = await getAccessToken();
        if (!token) { window.location.href = '/login'; return; }

        const user = await getCurrentUser();
        const profile = user ? await getUserProfile(user.id) : null;

        if (!profile || (profile.role !== 'trader' && profile.role !== 'admin')) {
          document.getElementById('authGuard').textContent = 'ليس لديك صلاحية الوصول إلى هذه الصفحة.';
          return;
        }
        if (profile.account_status === 'banned') {
          document.getElementById('authGuard').textContent = 'حسابك موقوف. يرجى التواصل مع الدعم.';
          return;
        }

        accessToken = token;
        document.getElementById('authGuard').style.display = 'none';
        document.getElementById('traderPage').style.display = '';
        loadStoreTab();
      } catch (err) {
        document.getElementById('authGuard').textContent = 'حدث خطأ أثناء التحقق من الجلسة.';
        console.error(err);
      }
    }

    // ─── STORE TAB ────────────────────────────────────────────────────────────
    async function loadStoreTab() {
      document.getElementById('storeLoading').style.display = '';
      document.getElementById('createStoreCard').style.display = 'none';
      document.getElementById('existingStoreCard').style.display = 'none';

      const { ok, data } = await apiFetch('/api/trader?resource=store');
      document.getElementById('storeLoading').style.display = 'none';

      if (!ok) {
        notice('فشل تحميل بيانات المتجر', 'err');
        return;
      }

      currentStore = data.store;

      if (!currentStore) {
        document.getElementById('createStoreCard').style.display = '';
      } else {
        renderStoreCard(currentStore);
        document.getElementById('existingStoreCard').style.display = '';
      }
    }

    function renderStoreCard(store) {
      document.getElementById('dispStoreName').textContent = store.name;
      document.getElementById('dispStorePhone').textContent = store.whatsapp_phone;
      const badge = document.getElementById('dispStoreBadge');
      badge.textContent = store.is_active ? 'نشط' : 'غير نشط';
      badge.className = 'store-status-badge ' + (store.is_active ? 'active' : 'inactive');
      document.getElementById('viewStoreLink').href = '/store?id=' + store.id;
      // Prefill edit form
      document.getElementById('editStoreName').value = store.name;
      document.getElementById('editStorePhone').value = store.whatsapp_phone;
      document.getElementById('editStoreActive').checked = store.is_active;
    }

    function toggleStoreEditForm(open) {
      const form = document.getElementById('storeEditForm');
      const btns = document.getElementById('storeActionBtns');
      form.style.display = open ? '' : 'none';
      btns.style.display = open ? 'none' : '';
    }

    async function createStore() {
      const name = document.getElementById('newStoreName').value.trim();
      const whatsapp_phone = document.getElementById('newStorePhone').value.trim();
      if (!name || !whatsapp_phone) { notice('يرجى إدخال اسم المتجر ورقم الواتساب', 'err'); return; }

      const btn = document.getElementById('createStoreBtn');
      btn.disabled = true;
      const { ok, data } = await apiFetch('/api/trader?resource=store', 'POST', { name, whatsapp_phone });
      btn.disabled = false;

      if (!ok) { notice(data.message || 'فشل إنشاء المتجر', 'err'); return; }
      notice('تم إنشاء المتجر بنجاح ✓');
      currentStore = data.store;
      document.getElementById('createStoreCard').style.display = 'none';
      renderStoreCard(currentStore);
      document.getElementById('existingStoreCard').style.display = '';
    }

    async function saveStore() {
      const name = document.getElementById('editStoreName').value.trim();
      const whatsapp_phone = document.getElementById('editStorePhone').value.trim();
      const is_active = document.getElementById('editStoreActive').checked;
      if (!name || !whatsapp_phone) { notice('يرجى إدخال اسم المتجر ورقم الواتساب', 'err'); return; }

      const { ok, data } = await apiFetch('/api/trader?resource=store', 'PATCH', { name, whatsapp_phone, is_active });
      if (!ok) { notice(data.message || 'فشل تحديث المتجر', 'err'); return; }
      notice('تم تحديث بيانات المتجر ✓');
      currentStore = data.store;
      renderStoreCard(currentStore);
      toggleStoreEditForm(false);
    }

    // ─── PRODUCTS TAB ─────────────────────────────────────────────────────────
    async function loadProducts() {
      const loading = document.getElementById('productsLoading');
      loading.style.display = '';
      document.getElementById('productsList').innerHTML = '';

      const { ok, data } = await apiFetch('/api/trader?resource=products');
      loading.style.display = 'none';

      if (!ok) { notice('فشل تحميل المنتجات', 'err'); return; }
      renderProducts(data.items || []);
    }

    function renderProducts(items) {
      const list = document.getElementById('productsList');
      if (!items.length) {
        list.innerHTML = '<div class="empty-state">لا توجد منتجات بعد، أضف أول منتج أعلاه.</div>';
        return;
      }
      list.innerHTML = items.map(p => productRowHTML(p)).join('');
    }

    function productRowHTML(p) {
      return `
        <div class="product-row" id="pr-${p.id}" data-id="${p.id}" data-name="${escHtml(p.name)}" data-price="${p.price}" data-avail="${p.is_available}">
          <span class="product-row-name">${escHtml(p.name)}</span>
          <span class="product-row-price">${fmtPrice(p.price)}</span>
          <span class="product-avail-badge ${p.is_available ? 'yes' : 'no'}">${p.is_available ? 'متوفر' : 'نفد'}</span>
          <div class="product-row-actions">
            <button class="trader-btn trader-btn-secondary trader-btn-sm" onclick="openProductEdit('${p.id}')">✏️</button>
            <button class="trader-btn trader-btn-danger trader-btn-sm" onclick="deleteProduct('${p.id}')">🗑️</button>
          </div>
          <div class="product-edit-form" id="pef-${p.id}">
            <div class="product-edit-row">
              <div class="trader-field">
                <label>الاسم</label>
                <input type="text" id="pef-name-${p.id}" value="${escHtml(p.name)}" maxlength="120" />
              </div>
              <div class="trader-field">
                <label>السعر</label>
                <input type="number" id="pef-price-${p.id}" value="${p.price}" min="0" step="250" />
              </div>
            </div>
            <div class="toggle-row" style="margin-bottom:0.5rem">
              <label class="toggle-switch">
                <input type="checkbox" id="pef-avail-${p.id}" ${p.is_available ? 'checked' : ''} />
                <span class="toggle-slider"></span>
              </label>
              <span class="toggle-label">متوفر</span>
            </div>
            <div style="display:flex;gap:0.5rem">
              <button class="trader-btn trader-btn-primary trader-btn-sm" onclick="saveProduct('${p.id}')">حفظ</button>
              <button class="trader-btn trader-btn-secondary trader-btn-sm" onclick="closeProductEdit('${p.id}')">إلغاء</button>
            </div>
          </div>
        </div>`;
    }

    function escHtml(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function openProductEdit(id) {
      if (editingProductId && editingProductId !== id) closeProductEdit(editingProductId);
      document.getElementById('pef-' + id)?.classList.add('open');
      editingProductId = id;
    }
    function closeProductEdit(id) {
      document.getElementById('pef-' + id)?.classList.remove('open');
      if (editingProductId === id) editingProductId = null;
    }

    async function addProduct() {
      const name = document.getElementById('newProductName').value.trim();
      const price = parseFloat(document.getElementById('newProductPrice').value);
      if (!name) { notice('يرجى إدخال اسم المنتج', 'err'); return; }
      if (isNaN(price) || price < 0) { notice('يرجى إدخال سعر صحيح', 'err'); return; }

      const { ok, data } = await apiFetch('/api/trader?resource=products', 'POST', { name, price, is_available: true });
      if (!ok) { notice(data.message || 'فشل إضافة المنتج', 'err'); return; }
      notice('تمت إضافة المنتج ✓');
      document.getElementById('newProductName').value = '';
      document.getElementById('newProductPrice').value = '';
      loadProducts();
    }

    async function saveProduct(id) {
      const name = document.getElementById('pef-name-' + id).value.trim();
      const price = parseFloat(document.getElementById('pef-price-' + id).value);
      const is_available = document.getElementById('pef-avail-' + id).checked;
      if (!name) { notice('يرجى إدخال اسم المنتج', 'err'); return; }
      if (isNaN(price) || price < 0) { notice('يرجى إدخال سعر صحيح', 'err'); return; }

      const { ok, data } = await apiFetch('/api/trader?resource=products&id=' + id, 'PATCH', { name, price, is_available });
      if (!ok) { notice(data.message || 'فشل تحديث المنتج', 'err'); return; }
      notice('تم تحديث المنتج ✓');
      closeProductEdit(id);
      loadProducts();
    }

    async function deleteProduct(id) {
      if (!confirm('هل أنت متأكد من حذف هذا المنتج؟')) return;
      const { ok, data } = await apiFetch('/api/trader?resource=products&id=' + id, 'DELETE');
      if (!ok) { notice(data.message || 'فشل حذف المنتج', 'err'); return; }
      notice('تم حذف المنتج');
      document.getElementById('pr-' + id)?.remove();
    }

    // ─── ORDERS TAB ──────────────────────────────────────────────────────────
    document.getElementById('ordersFilter').addEventListener('click', (e) => {
      const pill = e.target.closest('.filter-pill');
      if (!pill) return;
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      currentOrderFilter = pill.dataset.status;
      loadOrders();
    });

    async function loadOrders() {
      const loading = document.getElementById('ordersLoading');
      loading.style.display = '';
      document.getElementById('ordersList').innerHTML = '';

      const url = '/api/trader?resource=orders' + (currentOrderFilter ? '&status=' + currentOrderFilter : '');
      const { ok, data } = await apiFetch(url);
      loading.style.display = 'none';

      if (!ok) { notice('فشل تحميل الطلبات', 'err'); return; }
      renderOrders(data.orders || []);
    }

    function renderOrders(orders) {
      const list = document.getElementById('ordersList');
      if (!orders.length) {
        list.innerHTML = '<div class="empty-state">لا توجد طلبات.</div>';
        return;
      }
      list.innerHTML = orders.map(o => orderCardHTML(o)).join('');
    }

    function orderCardHTML(o) {
      const items = Array.isArray(o.items)
        ? o.items.map(it => `<li><span>${escHtml(it.name)} × ${it.qty}</span><span>${fmtPrice(it.price * it.qty)}</span></li>`).join('')
        : '';

      const locationBtn = o.location_link
        ? `<a class="order-location-link" href="${escHtml(o.location_link)}" target="_blank" rel="noopener noreferrer">📍 الموقع</a>`
        : '';

      const actions = o.status === 'pending' ? `
        <button class="trader-btn trader-btn-primary trader-btn-sm" onclick="updateOrderStatus('${o.id}', 'confirmed', this)">✓ تأكيد</button>
        <button class="trader-btn trader-btn-danger trader-btn-sm"  onclick="updateOrderStatus('${o.id}', 'cancelled', this)">✕ إلغاء</button>
      ` : '';

      const deliveryLabel = o.delivery_type === 'delivery' ? 'توصيل' : 'استلام من المتجر';
      const statusLabels = { pending: 'قيد الانتظار', confirmed: 'مؤكد', cancelled: 'ملغي' };

      return `
        <div class="order-trader-card" id="oc-${o.id}">
          <div class="order-trader-head">
            <span class="order-trader-id">#${o.id.slice(0,8)}… — ${fmtDate(o.created_at)}</span>
            <span class="order-status-badge ${o.status}">${statusLabels[o.status] || o.status}</span>
          </div>
          <div class="order-trader-meta">
            <strong>الاسم:</strong> ${escHtml(o.customer_name)}<br/>
            <strong>الهاتف:</strong> ${escHtml(o.customer_phone)}<br/>
            <strong>نوع الطلب:</strong> ${deliveryLabel}
            ${locationBtn ? '<br/>' + locationBtn : ''}
          </div>
          <ul class="order-items-list">${items}</ul>
          <div class="order-trader-total">المجموع: ${fmtPrice(o.total_price)}</div>
          <div class="order-trader-actions">${actions}</div>
        </div>`;
    }

    async function updateOrderStatus(id, status, btn) {
      btn.disabled = true;
      const { ok, data } = await apiFetch('/api/trader?resource=orders', 'PATCH', { id, status });
      if (!ok) {
        notice(data.message || 'فشل تحديث الطلب', 'err');
        btn.disabled = false;
        return;
      }
      notice(status === 'confirmed' ? 'تم تأكيد الطلب ✓' : 'تم إلغاء الطلب');
      // Re-render that single card's actions + badge
      loadOrders();
    }

    // ─── Boot ─────────────────────────────────────────────────────────────────
    window.addEventListener('load', boot);
  </script>
</body>
</html>
