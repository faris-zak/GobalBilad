<!DOCTYPE html>
<html lang="ar-OM" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>جوب البلاد - حسابي</title>
    <meta name="description" content="إدارة حساب العميل" />
    <link rel="icon" href="assets/images/gb-icon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
      .account-wrap { max-width: 820px; margin: 0 auto; padding: 34px 24px 70px; }
      .account-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; }
      .account-title { font-family: var(--font-display); font-size: clamp(26px, 4.5vw, 34px); margin-bottom: 6px; }
      .account-sub { color: var(--text-mid); margin-bottom: 20px; }
      .row { display: grid; grid-template-columns: 1fr; gap: 14px; margin-bottom: 14px; }
      .field label { display: block; font-weight: 600; margin-bottom: 6px; }
      .field input, .field textarea { width: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; font-family: var(--font-body); font-size: 15px; }
      .field textarea { min-height: 92px; resize: vertical; }
      .field input[readonly] { background: #f8f8f8; color: #666; }
      .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
      .location-box { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; background: #fcfcfc; }
      .location-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
      .location-status { margin-top: 10px; font-size: 14px; color: var(--text-mid); }
      .location-status.ok { color: #067647; }
      .location-status.warn { color: #b54708; }
      .location-status.err { color: #b42318; }
      .map-panel { margin-top: 12px; border: 1px dashed var(--border); border-radius: var(--radius-sm); padding: 10px; display: block; }
      .map-wrap { position: relative; }
      .map-canvas { width: 100%; height: 300px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
      .map-crosshair {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 34px;
        height: 34px;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 450;
      }
      .map-crosshair::before,
      .map-crosshair::after {
        content: '';
        position: absolute;
        background: #d92d20;
        border-radius: 999px;
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.8);
      }
      .map-crosshair::before { width: 2px; height: 34px; left: 16px; top: 0; }
      .map-crosshair::after { width: 34px; height: 2px; left: 0; top: 16px; }
      .map-crosshair-dot {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 8px;
        height: 8px;
        transform: translate(-50%, -50%);
        background: #d92d20;
        border: 2px solid #fff;
        border-radius: 999px;
      }
      .btn-danger { background: #d92d20; color: #fff; border: none; }
      .btn-danger:hover { background: #b42318; }
      .msg { display: none; margin-top: 12px; border-radius: 8px; padding: 10px; font-size: 14px; }
      .msg.ok { display: block; background: #ecfdf3; color: #067647; border: 1px solid #abefc6; }
      .msg.err { display: block; background: #fef3f2; color: #b42318; border: 1px solid #fecdca; }
      @media (min-width: 700px) { .row.two { grid-template-columns: 1fr 1fr; } }
    </style>
  </head>
  <body>
    <header class="navbar">
      <div class="nav-inner">
        <a href="index.html" class="logo">
          <span class="logo-icon">🛒</span>
          <span class="logo-text">جوب البلاد</span>
        </a>
        <a href="stores.html" class="btn btn-outline">المتاجر</a>
      </div>
    </header>

    <main class="account-wrap">
      <section class="account-card">
        <h1 class="account-title">حسابي</h1>
        <p class="account-sub">حدّث بياناتك الشخصية كعميل.</p>

        <form id="accountForm">
          <div class="row">
            <div class="field">
              <label for="email">البريد الإلكتروني</label>
              <input id="email" type="email" readonly />
            </div>
          </div>

          <div class="row two">
            <div class="field">
              <label for="fullName">الاسم الكامل</label>
              <input id="fullName" type="text" placeholder="مثال: أحمد العلوي" />
            </div>
            <div class="field">
              <label for="phone">رقم الهاتف</label>
              <input id="phone" type="tel" placeholder="+968 9xxxxxxx" />
            </div>
          </div>

          <div class="row two">
            <div class="field">
              <label for="city">المدينة</label>
              <input id="city" type="text" placeholder="مسقط" />
            </div>
            <div class="field">
              <label for="address">العنوان (اختياري)</label>
              <textarea id="address" placeholder="الحي، الشارع، معلم قريب..."></textarea>
            </div>
          </div>

          <div class="row">
            <div class="location-box">
              <strong>تحديد الموقع</strong>
              <p class="account-sub" style="margin: 6px 0 0;">نستخدم الموقع مرة واحدة للتحقق من التغطية وتقدير التوصيل، بدون تتبع مستمر.</p>
              <div class="location-actions">
                <button id="useGpsBtn" class="btn btn-outline" type="button">استخدام موقعي الحالي</button>
                <button id="centerServiceBtn" class="btn btn-outline" type="button">الانتقال لمركز نطاق الخدمة</button>
              </div>
              <div class="row two" style="margin-top: 10px;">
                <div class="field">
                  <label for="latitude">خط العرض</label>
                  <input id="latitude" type="number" step="any" placeholder="23.6" readonly />
                </div>
                <div class="field">
                  <label for="longitude">خط الطول</label>
                  <input id="longitude" type="number" step="any" placeholder="58.4" readonly />
                </div>
              </div>
              <div class="location-actions">
                <button id="validateLocationBtn" class="btn btn-primary" type="button">التحقق من الموقع</button>
                <button id="lockCenterBtn" class="btn btn-outline" type="button">اعتماد مركز الخريطة</button>
              </div>
              <div id="mapPanel" class="map-panel">
                <div class="map-wrap">
                  <div id="mapCanvas" class="map-canvas"></div>
                  <div class="map-crosshair" aria-hidden="true"><span class="map-crosshair-dot"></span></div>
                </div>
                <p class="account-sub" style="margin: 8px 0 0;">حرّك الخريطة حتى يصبح موقعك تحت علامة + ثم اضغط اعتماد مركز الخريطة.</p>
              </div>
              <p id="locationStatus" class="location-status" aria-live="polite">استخدم الخريطة مباشرة أو زر GPS ثم تحقّق من الموقع.</p>
            </div>
          </div>

          <div class="actions">
            <button id="saveBtn" class="btn btn-primary" type="submit">حفظ البيانات</button>
            <button id="logoutBtn" class="btn btn-outline" type="button">تسجيل الخروج</button>
            <button id="deleteBtn" class="btn btn-danger" type="button">حذف الحساب</button>
          </div>

          <p id="accountMsg" class="msg"></p>
        </form>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
      const accountForm = document.getElementById('accountForm');
      const emailEl = document.getElementById('email');
      const fullNameEl = document.getElementById('fullName');
      const phoneEl = document.getElementById('phone');
      const cityEl = document.getElementById('city');
      const addressEl = document.getElementById('address');
      const accountMsg = document.getElementById('accountMsg');
      const saveBtn = document.getElementById('saveBtn');
      const logoutBtn = document.getElementById('logoutBtn');
      const deleteBtn = document.getElementById('deleteBtn');
      const useGpsBtn = document.getElementById('useGpsBtn');
      const centerServiceBtn = document.getElementById('centerServiceBtn');
      const validateLocationBtn = document.getElementById('validateLocationBtn');
      const lockCenterBtn = document.getElementById('lockCenterBtn');
      const latitudeEl = document.getElementById('latitude');
      const longitudeEl = document.getElementById('longitude');
      const locationStatusEl = document.getElementById('locationStatus');
      const mapPanelEl = document.getElementById('mapPanel');
      const mapCanvasEl = document.getElementById('mapCanvas');

      let currentUser = null;
      let locationValidated = false;
      let locationSource = 'map_pin';
      let map = null;
      let mapMarker = null;
      let skipNextAutoLock = true;

      const MAP_DEFAULT_CENTER = { lat: 22.796495, lng: 58.150668 };
      const MAP_DEFAULT_ZOOM = 14;

      function showMessage(type, text) {
        accountMsg.className = `msg ${type}`;
        accountMsg.textContent = text;
      }

      function setLocationStatus(type, text) {
        locationStatusEl.className = `location-status ${type}`;
        locationStatusEl.textContent = text;
      }

      function readLatLng() {
        const lat = Number(latitudeEl.value);
        const lng = Number(longitudeEl.value);
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
          return null;
        }
        return { lat, lng };
      }

      function toFiniteNumber(value) {
        const num = Number(value);
        return Number.isFinite(num) ? num : null;
      }

      function setCoordinates(lat, lng, options = {}) {
        const shouldUpdateMap = options.updateMap !== false;
        const resetValidation = options.resetValidation !== false;
        latitudeEl.value = String(lat);
        longitudeEl.value = String(lng);
        if (resetValidation) {
          locationValidated = false;
        }

        if (shouldUpdateMap && map && mapMarker) {
          mapMarker.setLatLng([lat, lng]);
          map.panTo([lat, lng], { animate: true });
        }
      }

      async function reverseGeocode(lat, lng) {
        const url = new URL('https://nominatim.openstreetmap.org/reverse');
        url.searchParams.set('format', 'jsonv2');
        url.searchParams.set('lat', String(lat));
        url.searchParams.set('lon', String(lng));
        url.searchParams.set('accept-language', 'ar');

        const response = await fetch(url.toString(), {
          headers: { Accept: 'application/json' }
        });

        if (!response.ok) {
          throw new Error('Reverse geocoding request failed');
        }

        const data = await response.json();
        const address = data.address || {};
        const city = address.city || address.town || address.village || address.state || '';
        const displayAddress = data.display_name || '';

        if (city && !cityEl.value.trim()) {
          cityEl.value = city;
        }
        if (displayAddress && !addressEl.value.trim()) {
          addressEl.value = displayAddress;
        }
      }

      function ensureMapReady() {
        if (map) {
          map.invalidateSize();
          return;
        }

        const seed = readLatLng() || MAP_DEFAULT_CENTER;
        map = L.map(mapCanvasEl).setView([seed.lat, seed.lng], MAP_DEFAULT_ZOOM);

        const satelliteLayer = L.tileLayer(
          'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
          {
            maxZoom: 19,
            attribution: 'Tiles &copy; Esri'
          }
        );

        const streetsLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 19,
          attribution: '&copy; OpenStreetMap contributors'
        });

        satelliteLayer.addTo(map);
        L.control.layers(
          {
            'قمر صناعي': satelliteLayer,
            'خريطة عادية': streetsLayer
          },
          null,
          { collapsed: true }
        ).addTo(map);

        mapMarker = L.marker([seed.lat, seed.lng], { draggable: true }).addTo(map);

        mapMarker.on('dragend', async () => {
          const markerLatLng = mapMarker.getLatLng();
          setCoordinates(markerLatLng.lat, markerLatLng.lng, { updateMap: false });
          locationSource = 'map_pin';
          setLocationStatus('warn', 'تم تحديث الإحداثيات من الخريطة. اضغط التحقق من الموقع.');

          try {
            await reverseGeocode(markerLatLng.lat, markerLatLng.lng);
          } catch (err) {
            console.error('Reverse geocoding failed:', err);
          }
        });

        map.on('click', async (event) => {
          const { lat, lng } = event.latlng;
          mapMarker.setLatLng([lat, lng]);
          setCoordinates(lat, lng, { updateMap: false });
          locationSource = 'map_pin';
          setLocationStatus('warn', 'تم تحديد نقطة جديدة على الخريطة. اضغط التحقق من الموقع.');

          try {
            await reverseGeocode(lat, lng);
          } catch (err) {
            console.error('Reverse geocoding failed:', err);
          }
        });

        map.on('moveend', () => {
          if (skipNextAutoLock) {
            skipNextAutoLock = false;
            return;
          }
          scheduleAutoLockCenter();
        });
      }

      async function lockMapCenter() {
        ensureMapReady();
        const center = map.getCenter();
        mapMarker.setLatLng(center);
        setCoordinates(center.lat, center.lng, { updateMap: false });
        locationSource = 'map_pin';
        setLocationStatus('warn', 'تم اعتماد مركز الخريطة. اضغط التحقق من الموقع.');

        try {
          await reverseGeocode(center.lat, center.lng);
        } catch (err) {
          console.error('Reverse geocoding failed:', err);
        }
      }

      let autoLockTimer = null;

      function scheduleAutoLockCenter() {
        if (autoLockTimer) {
          clearTimeout(autoLockTimer);
        }

        autoLockTimer = setTimeout(async () => {
          await lockMapCenter();
        }, 180);
      }

      async function validateLocationWithApi(lat, lng) {
        const response = await fetch('/api/validate-location', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ latitude: lat, longitude: lng })
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          const reason = data.message || 'فشل التحقق من الموقع.';
          throw new Error(reason);
        }

        return data;
      }

      async function loadAccount() {
        try {
          const session = await checkSession();
          if (!session) {
            window.location.replace('/login');
            return;
          }

          currentUser = session.user;
          emailEl.value = currentUser.email || '';

          const profile = await getUserProfile(currentUser.id);
          if (profile) {
            fullNameEl.value = profile.full_name || '';
            phoneEl.value = profile.phone || '';
            cityEl.value = profile.city || '';
            addressEl.value = profile.address || '';
            locationSource = profile.location_source || 'map_pin';

            const savedLat = toFiniteNumber(profile.latitude);
            const savedLng = toFiniteNumber(profile.longitude);
            if (savedLat !== null && savedLng !== null) {
              setCoordinates(savedLat, savedLng, { resetValidation: false });
              if (map) {
                map.setView([savedLat, savedLng], MAP_DEFAULT_ZOOM);
              }
            } else if (map) {
              map.setView([MAP_DEFAULT_CENTER.lat, MAP_DEFAULT_CENTER.lng], MAP_DEFAULT_ZOOM);
            }

            if (profile.location_validated) {
              locationValidated = true;
              setLocationStatus('ok', 'تم تحميل موقع محفوظ ومتحقق منه.');
            }
          }
        } catch (err) {
          console.error('Account load failed:', err);
          showMessage('err', 'تعذر تحميل بيانات الحساب.');
        }
      }

      useGpsBtn.addEventListener('click', () => {
        if (!navigator.geolocation) {
          setLocationStatus('err', 'المتصفح لا يدعم GPS. استخدم الإدخال اليدوي.');
          return;
        }

        locationValidated = false;
        setLocationStatus('warn', 'جاري تحديد موقعك...');

        navigator.geolocation.getCurrentPosition(
          async (pos) => {
            setCoordinates(pos.coords.latitude, pos.coords.longitude);
            locationSource = 'gps';
            setLocationStatus('warn', 'تم التقاط الموقع. اضغط التحقق من الموقع.');

            try {
              await reverseGeocode(pos.coords.latitude, pos.coords.longitude);
            } catch (err) {
              console.error('Reverse geocoding failed:', err);
            }
          },
          (error) => {
            if (error.code === error.PERMISSION_DENIED) {
              setLocationStatus('err', 'تم رفض الإذن. يمكنك إدخال الإحداثيات يدويًا.');
              return;
            }
            if (error.code === error.TIMEOUT) {
              setLocationStatus('err', 'انتهت مهلة GPS. حاول مجددًا أو أدخل الإحداثيات يدويًا.');
              return;
            }
            setLocationStatus('err', 'تعذر الحصول على الموقع. استخدم الإدخال اليدوي.');
          },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
        );
      });

      centerServiceBtn.addEventListener('click', () => {
        ensureMapReady();
        setCoordinates(MAP_DEFAULT_CENTER.lat, MAP_DEFAULT_CENTER.lng);
        locationSource = 'map_pin';
        setLocationStatus('warn', 'تم الانتقال إلى مركز نطاق الخدمة. حرّك المؤشر لموقعك الفعلي ثم تحقّق.');
      });

      lockCenterBtn.addEventListener('click', async () => {
        await lockMapCenter();
      });

      latitudeEl.addEventListener('input', () => {
        locationValidated = false;
      });

      longitudeEl.addEventListener('input', () => {
        locationValidated = false;
      });

      validateLocationBtn.addEventListener('click', async () => {
        const coords = readLatLng();
        if (!coords) {
          locationValidated = false;
          setLocationStatus('err', 'الرجاء إدخال إحداثيات صحيحة.');
          return;
        }

        validateLocationBtn.disabled = true;
        validateLocationBtn.textContent = 'جاري التحقق...';

        try {
          const result = await validateLocationWithApi(coords.lat, coords.lng);
          locationValidated = !!result.eligible;

          if (result.eligible) {
            setLocationStatus('ok', `الموقع داخل نطاق الخدمة. المسافة عن المركز: ${Number(result.distanceKm).toFixed(2)} كم.`);
          } else {
            setLocationStatus('err', `الموقع خارج نطاق الخدمة حاليًا. المسافة عن المركز: ${Number(result.distanceKm).toFixed(2)} كم.`);
          }
        } catch (err) {
          locationValidated = false;
          console.error('Location validation failed:', err);
          setLocationStatus('err', 'تعذر التحقق عبر الخادم الآن. يمكنك تعديل الإحداثيات والمحاولة مرة أخرى.');
        } finally {
          validateLocationBtn.disabled = false;
          validateLocationBtn.textContent = 'التحقق من الموقع';
        }
      });

      accountForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!currentUser) return;

        const coords = readLatLng();
        if (!coords) {
          showMessage('err', 'الرجاء تحديد الموقع على الخريطة أو عبر GPS قبل الحفظ.');
          return;
        }

        if (!locationValidated) {
          showMessage('err', 'الرجاء التحقق من الموقع قبل الحفظ.');
          return;
        }

        saveBtn.disabled = true;
        saveBtn.textContent = 'جاري الحفظ...';

        try {
          const finalValidation = await validateLocationWithApi(coords.lat, coords.lng);
          if (!finalValidation.eligible) {
            locationValidated = false;
            setLocationStatus('err', 'الموقع خارج نطاق الخدمة حاليًا. عدّل الموقع ثم أعد التحقق.');
            showMessage('err', 'لا يمكن حفظ موقع خارج نطاق الخدمة.');
            return;
          }

          await upsertUserProfile({
            user_id: currentUser.id,
            full_name: fullNameEl.value.trim(),
            phone: phoneEl.value.trim(),
            city: cityEl.value.trim(),
            address: addressEl.value.trim(),
            latitude: coords.lat,
            longitude: coords.lng,
            location_validated: true,
            location_source: locationSource
          });

          const savedProfile = await getUserProfile(currentUser.id);
          const persistedLat = toFiniteNumber(savedProfile?.latitude);
          const persistedLng = toFiniteNumber(savedProfile?.longitude);
          if (persistedLat === null || persistedLng === null) {
            throw new Error('SAVE_NOT_PERSISTED: Coordinates were not returned after save');
          }

          setCoordinates(persistedLat, persistedLng, { resetValidation: false });
          locationSource = savedProfile?.location_source || locationSource;
          locationValidated = true;
          showMessage('ok', 'تم حفظ البيانات بنجاح.');
        } catch (err) {
          console.error('Save failed:', err);
          const details = [err?.code, err?.message].filter(Boolean).join(' | ');
          showMessage('err', `تعذر حفظ البيانات.${details ? ` ${details}` : ''}`);
        } finally {
          saveBtn.disabled = false;
          saveBtn.textContent = 'حفظ البيانات';
        }
      });

      logoutBtn.addEventListener('click', async () => {
        try {
          await logout();
        } catch (err) {
          console.error('Logout failed:', err);
        }
        window.location.replace('/index.html');
      });

      deleteBtn.addEventListener('click', async () => {
        if (!currentUser) return;
        const approved = window.confirm('سيتم حذف جميع بيانات ملفك الشخصي. هل تريد المتابعة؟');
        if (!approved) return;

        try {
          await deleteAccountProfile(currentUser.id);
          await logout();
          window.location.replace('/index.html');
        } catch (err) {
          console.error('Delete profile failed:', err);
          showMessage('err', 'تعذر حذف البيانات.');
        }
      });

      ensureMapReady();
      loadAccount();
    </script>
  </body>
</html>
