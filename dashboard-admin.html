<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - جوب البلاد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <style>
        .dashboard-tabs { display:flex; gap:.5rem; margin-bottom:2rem; flex-wrap:wrap; }
        .tab-btn { padding:.6rem 1.25rem; border:1px solid var(--border); border-radius:var(--radius-full); background:var(--bg-card); cursor:pointer; font-weight:600; font-family:'Tajawal',sans-serif; font-size:.95rem; transition:var(--transition-fast); }
        .tab-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }
        .tab-section { display:none; }
        .tab-section.active { display:block; }
        .admin-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-md); padding:1.25rem; margin-bottom:1rem; }
        .admin-card h4 { margin-bottom:.5rem; }
        .admin-actions { display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.75rem; }
        .stat-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:1rem; margin-bottom:2rem; }
        .stat-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-md); padding:1.25rem; text-align:center; }
        .stat-card .stat-num { font-size:2rem; font-weight:800; color:var(--primary); }
        .stat-card .stat-label { font-size:.9rem; color:var(--text-muted); }
        .badge-status { padding:.25em .75em; border-radius:var(--radius-full); font-size:.82rem; font-weight:700; }
        .badge-pending  { background:#fef3c7;color:#92400e; }
        .badge-approved { background:#d1fae5;color:#065f46; }
        .badge-rejected { background:#fee2e2;color:#991b1b; }
        table { width:100%; border-collapse:collapse; font-size:.9rem; }
        th, td { padding:.6rem .75rem; text-align:right; border-bottom:1px solid var(--border); }
        th { background:var(--bg-main); font-weight:700; }
        tr:hover td { background:var(--bg-main); }
    </style>
</head>
<body>
<div id="navbar-container"></div>

<main class="container" style="padding-top:2rem;">
    <div id="auth-guard" style="display:none; text-align:center; padding:4rem;">
        <p style="font-size:1.2rem; color:var(--danger);">⛔ هذه الصفحة للمسؤول فقط.</p>
        <a href="login.html" class="btn btn-primary" style="margin-top:1rem;">تسجيل الدخول</a>
    </div>

    <div id="dashboard-body" style="display:none;">
        <div class="section-header">
            <h2>🛡️ لوحة الإدارة</h2>
        </div>

        <!-- Stats overview -->
        <div class="stat-grid" id="stats-grid">
            <div class="stat-card"><div class="stat-num" id="stat-stores">—</div><div class="stat-label">متاجر مسجلة</div></div>
            <div class="stat-card"><div class="stat-num" id="stat-drivers">—</div><div class="stat-label">مندوبون</div></div>
            <div class="stat-card"><div class="stat-num" id="stat-orders">—</div><div class="stat-label">إجمالي الطلبات</div></div>
            <div class="stat-card"><div class="stat-num" id="stat-users">—</div><div class="stat-label">مستخدمون</div></div>
        </div>

        <div class="dashboard-tabs">
            <button class="tab-btn active" onclick="switchTab('tab-stores',this)">🏪 المتاجر</button>
            <button class="tab-btn" onclick="switchTab('tab-drivers',this)">🚚 المندوبون</button>
            <button class="tab-btn" onclick="switchTab('tab-orders',this)">📋 الطلبات</button>
            <button class="tab-btn" onclick="switchTab('tab-users',this)">👥 المستخدمون</button>
        </div>

        <!-- STORES -->
        <div id="tab-stores" class="tab-section active">
            <div class="section-header">
                <h3>إدارة المتاجر</h3>
                <button class="btn btn-outline" style="font-size:.85rem;padding:.5rem 1rem;" onclick="loadStores()">🔄 تحديث</button>
            </div>
            <div id="stores-list"><div class="loader">جاري التحميل...</div></div>
        </div>

        <!-- DRIVERS -->
        <div id="tab-drivers" class="tab-section">
            <div class="section-header">
                <h3>إدارة المندوبين</h3>
                <button class="btn btn-outline" style="font-size:.85rem;padding:.5rem 1rem;" onclick="loadDrivers()">🔄 تحديث</button>
            </div>
            <div id="drivers-list"><div class="loader">جاري التحميل...</div></div>
        </div>

        <!-- ORDERS -->
        <div id="tab-orders" class="tab-section">
            <div class="section-header">
                <h3>جميع الطلبات</h3>
                <button class="btn btn-outline" style="font-size:.85rem;padding:.5rem 1rem;" onclick="loadAllOrders()">🔄 تحديث</button>
            </div>
            <div id="all-orders-list"><div class="loader">جاري التحميل...</div></div>
        </div>

        <!-- USERS -->
        <div id="tab-users" class="tab-section">
            <div class="section-header">
                <h3>جميع المستخدمين</h3>
                <button class="btn btn-outline" style="font-size:.85rem;padding:.5rem 1rem;" onclick="loadUsers()">🔄 تحديث</button>
            </div>
            <div id="users-list"><div class="loader">جاري التحميل...</div></div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="api/supabase.js"></script>
<script src="lib/utils.js"></script>
<script src="components/navbar.js"></script>
<script src="assets/js/dashboard-admin.js"></script>
</body>
</html>
